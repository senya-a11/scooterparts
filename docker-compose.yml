# docker-compose.yml — локальная разработка
# Fix #3: Секреты вынесены в .env файл (не хранятся в репозитории)
#
# Перед запуском:
#   1. Скопируйте .env.example в .env
#   2. Заполните SECRET_KEY и ADMIN_PASSWORD реальными значениями
#   3. Добавьте .env в .gitignore
#
# Запуск:  docker compose up -d
# Стоп:    docker compose down

version: "3.9"

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scooter_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scooter_pass}
      POSTGRES_DB: ${POSTGRES_DB:-scooter_shop}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"   # Fix: только localhost, не 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scooter_user} -d ${POSTGRES_DB:-scooter_shop}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Приложение ──
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env      # Fix #3: все секреты из .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-scooter_user}:${POSTGRES_PASSWORD:-scooter_pass}@postgres/${POSTGRES_DB:-scooter_shop}
      PORT: "8000"
      # SECRET_KEY и ADMIN_PASSWORD берутся из .env
    volumes:
      - ./static/uploads:/app/static/uploads
      - ./static/images:/app/static/images
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
